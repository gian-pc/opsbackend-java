services:
  postgres:
    image: postgres:16-alpine
    container_name: opsbackend-db
    environment:
      POSTGRES_DB: opsbackend
      POSTGRES_USER: opsuser
      POSTGRES_PASSWORD: opspass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: